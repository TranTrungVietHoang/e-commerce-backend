name: Build and Push Backend Image

on:
  push:
    branches: [ "main", "develop" ] # Tự động chạy khi bạn push code vào 1 trong 2 nhánh này

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài đặt Docker Buildx (Công nghệ đóng gói mới nhất)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Đăng nhập Docker Hub dùng các Secret bạn vừa tạo
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Tự động Build & Đẩy lên Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: trantrungviethoang/e-commerce-backend:latest

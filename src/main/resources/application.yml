spring:
  application:
    name: e-commerce-backend
  
  # Cấu hình SQL Server
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ecommerce_marketplace;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  # Cấu hình Mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_email@gmail.com} 
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# CẤU TRÚC JWT ĐÚNG CHO CÁCH 2 (KHỚP VỚI @Value("${jwt.expiration.access}"))
jwt:
  secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItZWNvbW1lcmNlLW1hcmtldHBsYWNlLXByb2plY3QtMjAyNg==}
  expiration:
    access: ${JWT_ACCESS_EXPIRATION:900000}      # Tương ứng jwt.expiration.access
    refresh: ${JWT_REFRESH_EXPIRATION:604800000} # Tương ứng jwt.expiration.refresh


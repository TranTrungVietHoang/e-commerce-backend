spring:
  application:
    name: e-commerce-backend
  
  # ============================================
  # Database Configuration (SQL Server)
  # SEE: .env file for values
  # DO NOT hardcode passwords here!
  # ============================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  # ============================================
  # Email Configuration (Gmail SMTP)
  # SEE: .env file for values
  # ============================================
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ============================================
# JWT Configuration
# SEE: .env file for values
# ============================================
jwt:
  secret: ${JWT_SECRET}
  expiration:
    access: ${JWT_ACCESS_EXPIRATION}
    refresh: ${JWT_REFRESH_EXPIRATION}

# ============================================
# Cloudinary Configuration (Image Storage)
# SEE: .env file for values
# ============================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ============================================
# Sepay Payment Gateway Configuration
# SEE: .env file for values
# ============================================
sepay:
  api-id: ${SEPAY_API_ID}
  api-key: ${SEPAY_API_KEY}
  api-secret: ${SEPAY_API_SECRET}
  api-url: ${SEPAY_API_URL}
  webhook-secret: ${SEPAY_WEBHOOK_SECRET}

server:
  port: ${SERVER_PORT:8080}

app:
  sepay:
    api-key: ${APP_SEPAY_API_KEY}

logging:
  level:
    com.ecommerce: ${LOGGING_LEVEL:DEBUG}
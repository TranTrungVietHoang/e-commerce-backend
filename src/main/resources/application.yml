spring:
  application:
    name: e-commerce-backend
  datasource:
    # Cấu hình SQL Server - Sử dụng biến môi trường để bảo mật
    url: jdbc:sqlserver://localhost:1433;databaseName=ecommerce_marketplace;encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa} # Mặc định là sa nếu không cài đặt biến môi trường
    password: ${DB_PASSWORD:123456}   # Mặc định để trống nếu không cài đặt biến môi trường
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

server:
  port: 8080

logging:
  level:
    com.ecommerce: DEBUG
